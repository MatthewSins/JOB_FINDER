<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeonScrape - Job Radar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        cyan: {
                            400: '#22d3ee',
                            500: '#06b6d4',
                            900: '#164e63',
                        },
                        fuchsia: {
                            500: '#d946ef',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['Fira Code', 'monospace'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Fira+Code&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0f172a;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,0.2) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,0.2) 0, transparent 50%);
            background-attachment: fixed;
            color: #e2e8f0;
        }
        
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .neon-border {
            border: 1px solid #22d3ee;
            box-shadow: 0 0 10px rgba(34, 211, 238, 0.2), inset 0 0 10px rgba(34, 211, 238, 0.1);
        }

        .neon-text {
            text-shadow: 0 0 8px rgba(34, 211, 238, 0.5);
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body class="min-h-screen flex flex-col p-4 md:p-8 font-sans">

    <header class="mb-8 text-center">
        <h1 class="text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-fuchsia-500 neon-text mb-2">NEONSCRAPE</h1>
        <p class="text-slate-400 text-sm font-mono">Real-time ATS Dorking Engine</p>
    </header>

    <main class="max-w-6xl w-full mx-auto grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <!-- Left Column: Controls -->
        <div class="lg:col-span-1 space-y-6">

            <!-- Search Filters -->
            <div class="glass-panel rounded-xl p-5 border-l-4 border-l-cyan-400">
                <h2 class="text-sm font-bold text-slate-300 uppercase tracking-wider mb-4 font-mono">1. Search Parameters</h2>
                <div class="space-y-4">
                    
                    <div>
                        <label class="block text-xs text-slate-400 mb-1">Role / Keyword</label>
                        <input type="text" id="roleInput" placeholder="e.g. React Developer" value="Node.js Developer" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-cyan-500 transition-colors">
                    </div>

                    <div>
                        <label class="block text-xs text-slate-400 mb-1">Location / Region</label>
                        <select id="locationInput" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-cyan-500 appearance-none">
                            <option value="Remote">Remote (Global)</option>
                            <option value="India">India</option>
                            <option value="USA">USA</option>
                            <option value="Europe">Europe</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-xs text-slate-400 mb-1">Job Type</label>
                        <select id="typeInput" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-cyan-500 appearance-none">
                            <option value="Full-time OR Contract OR Freelance">Any Type</option>
                            <option value="Contract OR Freelance">Contract / Freelance</option>
                            <option value="Full-time">Full-time</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-xs text-slate-400 mb-1">Recency (Time limit)</label>
                        <select id="timeInput" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-cyan-500 appearance-none">
                            <option value="d1">Past 24 Hours</option>
                            <option value="d2">Past 48 Hours</option>
                            <option value="w1">Past Week</option>
                            <option value="m1">Past Month</option>
                        </select>
                    </div>

                    <button id="searchBtn" class="w-full mt-4 bg-gradient-to-r from-cyan-600 to-cyan-500 hover:from-cyan-500 hover:to-cyan-400 text-white font-bold py-3 px-4 rounded-lg shadow-lg shadow-cyan-500/30 transition-all active:scale-95 flex items-center justify-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        Execute Scan
                    </button>
                </div>
            </div>

            <!-- Target ATS Platforms Display -->
            <div class="glass-panel rounded-xl p-4">
                <p class="text-xs text-slate-400 mb-2 font-mono">Targeting ATS Platforms:</p>
                <div class="flex flex-wrap gap-2">
                    <span class="px-2 py-1 bg-slate-800 rounded text-xs text-slate-300">Greenhouse</span>
                    <span class="px-2 py-1 bg-slate-800 rounded text-xs text-slate-300">Lever</span>
                    <span class="px-2 py-1 bg-slate-800 rounded text-xs text-slate-300">Workable</span>
                    <span class="px-2 py-1 bg-slate-800 rounded text-xs text-slate-300">Ashby</span>
                </div>
            </div>

        </div>

        <!-- Right Column: Results Feed -->
        <div class="lg:col-span-2 flex flex-col h-[800px]">
            
            <!-- Terminal Header -->
            <div class="bg-slate-900 rounded-t-xl p-3 border-b border-slate-700 flex justify-between items-center">
                <div class="flex space-x-2">
                    <div class="w-3 h-3 rounded-full bg-slate-600"></div>
                    <div class="w-3 h-3 rounded-full bg-slate-600"></div>
                    <div class="w-3 h-3 rounded-full bg-slate-600"></div>
                </div>
                <div class="text-xs font-mono text-cyan-400" id="statusText">SYSTEM IDLE</div>
            </div>

            <!-- Generated Dork Viewer -->
            <div class="bg-slate-800/50 p-3 border-b border-slate-700 font-mono text-xs text-slate-400 break-all hidden" id="dorkViewerContainer">
                <span class="text-fuchsia-400">Executing Dork: </span>
                <span id="dorkDisplay" class="text-slate-300"></span>
            </div>

            <!-- Results Container -->
            <div id="resultsContainer" class="glass-panel rounded-b-xl p-4 flex-1 overflow-y-auto space-y-4 relative">
                
                <!-- Initial State -->
                <div id="initialState" class="h-full flex flex-col items-center justify-center text-slate-500 opacity-50">
                    <svg class="w-16 h-16 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                    <p class="font-mono text-sm">Enter API credentials and execute scan.</p>
                </div>

                <!-- Loader -->
                <div id="loader" class="hidden h-full flex-col items-center justify-center">
                    <div class="w-10 h-10 border-4 border-cyan-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                    <p class="font-mono text-sm text-cyan-400 animate-pulse">Scanning ATS databases...</p>
                </div>

                <!-- Feed (Populated by JS) -->
                <div id="feed" class="hidden space-y-4 pb-4"></div>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const searchBtn = document.getElementById('searchBtn');
            
            const roleInput = document.getElementById('roleInput');
            const locationInput = document.getElementById('locationInput');
            const typeInput = document.getElementById('typeInput');
            const timeInput = document.getElementById('timeInput');
            
            const resultsContainer = document.getElementById('resultsContainer');
            const feed = document.getElementById('feed');
            const loader = document.getElementById('loader');
            const initialState = document.getElementById('initialState');
            const statusText = document.getElementById('statusText');
            
            const dorkViewerContainer = document.getElementById('dorkViewerContainer');
            const dorkDisplay = document.getElementById('dorkDisplay');

            // The specific ATS tracking sites we want to scrape
            const ATS_SITES = "(site:lever.co OR site:boards.greenhouse.io OR site:jobs.ashbyhq.com OR site:applytojob.com)";

            searchBtn.addEventListener('click', async () => {
                const role = roleInput.value.trim();
                if (!role) {
                    showError("Please enter a role to search for.");
                    return;
                }

                // Constructing the exact Google Dork
                const location = locationInput.value;
                const type = typeInput.value;
                const timeRestrict = timeInput.value; // e.g., 'd1', 'w1'
                
                // Example Dork: "React Developer" ("Remote") ("Contract") (site:lever.co OR site:...)
                const dorkQuery = `"${role}" ("${location}") ("${type}") ${ATS_SITES}`;
                
                // Update UI State
                initialState.classList.add('hidden');
                feed.classList.add('hidden');
                loader.classList.remove('hidden');
                feed.innerHTML = '';
                
                statusText.innerText = "QUERYING GOOGLE CUSTOM SEARCH API...";
                statusText.classList.remove('text-cyan-400', 'text-red-400');
                statusText.classList.add('text-fuchsia-400', 'animate-pulse');
                
                dorkViewerContainer.classList.remove('hidden');
                dorkDisplay.innerText = dorkQuery;

                try {
                    const encodedQuery = encodeURIComponent(dorkQuery);
                    // Hit our secure Vercel Serverless API instead of Google directly
                    const apiUrl = `/api/search?q=${encodedQuery}&timeRestrict=${timeRestrict}`;

                    const response = await fetch(apiUrl);
                    const data = await response.json();

                    loader.classList.add('hidden');
                    
                    if (!response.ok || data.error) {
                        throw new Error(data.error || "Secure API Error");
                    }

                    if (!data.items || data.items.length === 0) {
                        showEmptyState();
                        return;
                    }

                    renderJobs(data.items);
                    
                    statusText.innerText = `SCAN COMPLETE: ${data.items.length} RESULTS`;
                    statusText.classList.remove('text-fuchsia-400', 'animate-pulse', 'text-red-400');
                    statusText.classList.add('text-cyan-400');
                    feed.classList.remove('hidden');

                } catch (error) {
                    loader.classList.add('hidden');
                    showError(error.message);
                }
            });

            function renderJobs(items) {
                items.forEach(item => {
                    // Extract domain to show which ATS it came from
                    let domain = '';
                    try {
                        domain = new URL(item.link).hostname;
                    } catch(e) { domain = item.displayLink; }

                    const jobCard = document.createElement('div');
                    jobCard.className = "bg-slate-800/80 hover:bg-slate-800 border border-slate-700 hover:border-cyan-500/50 rounded-lg p-4 transition-all group";
                    
                    jobCard.innerHTML = `
                        <div class="flex justify-between items-start mb-2">
                            <h3 class="font-bold text-lg text-white group-hover:text-cyan-400 transition-colors">
                                <a href="${item.link}" target="_blank" rel="noopener noreferrer">${item.title}</a>
                            </h3>
                            <span class="text-xs font-mono bg-slate-900 px-2 py-1 rounded text-slate-400 border border-slate-700">${domain}</span>
                        </div>
                        <p class="text-sm text-slate-300 mb-4 leading-relaxed">${item.snippet}</p>
                        <div class="flex justify-between items-center mt-2">
                            <div class="flex gap-2">
                                <span class="text-xs bg-cyan-900/40 text-cyan-400 px-2 py-1 rounded-md border border-cyan-800/50 flex items-center gap-1">
                                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                    Recent
                                </span>
                            </div>
                            <a href="${item.link}" target="_blank" rel="noopener noreferrer" class="text-xs font-bold text-cyan-400 hover:text-white flex items-center gap-1 transition-colors">
                                Apply Now 
                                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                            </a>
                        </div>
                    `;
                    feed.appendChild(jobCard);
                });
            }

            function showError(msg) {
                feed.innerHTML = `
                    <div class="p-4 bg-red-900/30 border border-red-800 rounded-lg flex items-start gap-3 text-red-200">
                        <svg class="w-5 h-5 mt-0.5 text-red-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        <div>
                            <strong class="block font-bold text-red-400 mb-1">Error Executing Request</strong>
                            <p class="text-sm font-mono">${msg}</p>
                        </div>
                    </div>
                `;
                feed.classList.remove('hidden');
                statusText.innerText = "SYSTEM FAULT";
                statusText.classList.remove('text-fuchsia-400', 'animate-pulse', 'text-cyan-400');
                statusText.classList.add('text-red-400');
            }

            function showEmptyState() {
                feed.innerHTML = `
                    <div class="h-full flex flex-col items-center justify-center text-slate-500 opacity-80 mt-10">
                        <svg class="w-12 h-12 mb-3 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        <p class="font-mono text-sm">No recent listings found matching these exact parameters.</p>
                        <p class="text-xs mt-2">Try expanding the time range or removing strict constraints.</p>
                    </div>
                `;
                feed.classList.remove('hidden');
                statusText.innerText = "SCAN COMPLETE: 0 RESULTS";
                statusText.classList.remove('text-fuchsia-400', 'animate-pulse', 'text-cyan-400');
                statusText.classList.add('text-slate-400');
            }
        });
    </script>
</body>
</html>
